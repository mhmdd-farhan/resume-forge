services:
  db:
    image: postgres:16
    container_name: resumeforge-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: resumeforge
    # TIDAK expose port 5432 ke host — hanya accessible dalam Docker network
    networks:
      - forge_network
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d resumeforge"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: resumeforge-app
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/resumeforge?schema=public
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - POLAR_ACCESS_TOKEN=${POLAR_ACCESS_TOKEN}
      - POLAR_WEBHOOK_SECRET=${POLAR_WEBHOOK_SECRET}
      - N8N_BASIC_AUTH=${N8N_BASIC_AUTH}
      - NEXT_PUBLIC_POLAR_PREMIUM_PRODUCT_ID=${NEXT_PUBLIC_POLAR_PREMIUM_PRODUCT_ID}
      - NEXT_PUBLIC_POLAR_ANNUAL_PRODUCT_ID=${NEXT_PUBLIC_POLAR_ANNUAL_PRODUCT_ID}
    networks:
      - forge_network
      - nginx-proxy
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:

networks:
  forge_network:
    driver: bridge
  nginx-proxy:
    external: true
